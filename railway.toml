[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# No startCommand here — Railway would run it without a shell, so ${VAR:-default}
# expansion wouldn't happen. The Dockerfile's CMD wraps gunicorn in `sh -c`,
# which does expand $PORT and $WEB_CONCURRENCY correctly.
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
